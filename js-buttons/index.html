<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grist JS Buttons</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <link rel="stylesheet" href="styles.css">
  <script defer src="script.js"></script>
</head>
<body>
  <main class="widget" aria-live="polite">
    <button
      id="panelConfigButton"
      class="panel-config-button"
      type="button"
      title="Configure JavaScript buttons"
      aria-label="Configure JavaScript buttons"
    >⚙</button>

    <div id="buttonRow" class="button-row"></div>


    <div id="status" class="status" hidden></div>
  </main>

  <dialog id="configDialog" class="config-dialog">
    <form method="dialog" class="config-panel">
      <header class="config-header">
        <h1>JavaScript buttons</h1>
        <button id="closeConfigButton" class="icon-button" type="button" title="Close" aria-label="Close">×</button>
      </header>

      <p class="help-text">
        Define <code>function get_buttons()</code>. It may return an array, <code>null</code>, or a Promise resolving to either.
      </p>

      <section class="config-source-panel" aria-label="Configuration source">
        <label class="source-field">
          <span>Source</span>
          <select id="configSourceSelect" class="source-select">
            <option value="local">Local widget options</option>
            <option value="table">Shared Grist table</option>
          </select>
        </label>

        <div id="sharedConfigControls" class="shared-config-controls" hidden>
          <label class="source-field compact-field">
            <span>Table</span>
            <input id="sharedConfigTableId" class="source-input" type="text" spellcheck="false" autocomplete="off">
          </label>
          <label class="source-field compact-field">
            <span>Name</span>
            <input id="sharedConfigName" class="source-input" type="text" spellcheck="false" autocomplete="off">
          </label>
          <button id="loadSharedConfigButton" class="secondary-button small-button" type="button">Load</button>
          <button id="createSharedTableButton" class="secondary-button small-button" type="button" hidden>Create table</button>
        </div>
      </section>

      <div id="configEditor" class="monaco-editor-panel"></div>
      <textarea id="configCodeFallback" class="code-editor-fallback" spellcheck="false" autocomplete="off" hidden></textarea>

      <div id="configStatus" class="status config-status" hidden></div>

      <div class="config-actions">
        <button id="resetConfigButton" class="secondary-button" type="button">Reset example</button>
        <span class="spacer"></span>
        <button id="testConfigButton" class="secondary-button" type="button">Test</button>
        <button id="saveConfigButton" class="primary-button" type="button">Save</button>
      </div>
    </form>
  </dialog>
</body>
</html>
